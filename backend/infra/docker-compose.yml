# Local development: one Postgres (multiple DBs via init), Redis for future queues, all Go services.
# Strangler: set LEGACY_API_URL on api-gateway to the legacy-api container until microservices own full API surface.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      # Avoid RabbitMQ default `guest` restriction (typically localhost-only).
      RABBITMQ_DEFAULT_USER: velune
      RABBITMQ_DEFAULT_PASS: velune
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  legacy-api:
    build:
      context: ..
      dockerfile: services/legacy-api/Dockerfile
    environment:
      HTTP_PORT: "8090"
    ports:
      - "8090:8090"

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    environment:
      HTTP_PORT: "8081"
      DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/velune_auth?sslmode=disable
      JWT_SECRET: dev-only-change-me
      MIGRATIONS_PATH: file:///app/migrations
      LOG_FORMAT: dev
      # RabbitMQ integration (used for provisioning events)
      BROKER_URL: amqp://velune:velune@rabbitmq:5672/
      BROKER_EXCHANGE: velune.events
      BROKER_ROUTING_KEY: notification.overspend.requested
      BROKER_DLX: velune.events.dlx
      BROKER_DLQ: velune.events.dlq
      BROKER_DLQ_ROUTING_KEY: velune.dlq
      # auth-service email OTP settings
      OTP_VALIDITY_SECONDS: "300"
      OTP_RESEND_COOLDOWN_SECONDS: "30"
      OTP_MAX_RESENDS: "3"
      OTP_MAX_VERIFY_ATTEMPTS: "3"
      # Leave SMTP_HOST/SMTP_PORT empty to use the non-delivering dev stub.
      SMTP_HOST: ""
      SMTP_PORT: ""
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_TLS: "false"
      AUTH_PROVISION_COMPLETED_QUEUE: auth.provision_completed
    ports:
      - "8081:8081"
    profiles: ["split"]

  transaction-service:
    build:
      context: ..
      dockerfile: services/transaction-service/Dockerfile
    environment:
      HTTP_PORT: "8082"
      DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/velune_transaction?sslmode=disable
      JWT_SECRET: dev-only-change-me
      MIGRATIONS_PATH: file:///app/migrations
      LOG_FORMAT: dev
      BROKER_URL: amqp://velune:velune@rabbitmq:5672/
      BROKER_EXCHANGE: velune.events
      BROKER_ROUTING_KEY: notification.overspend.requested
      BROKER_DLX: velune.events.dlx
      BROKER_DLQ: velune.events.dlq
      BROKER_DLQ_ROUTING_KEY: velune.dlq
      OUTBOX_BATCH_SIZE: "50"
      OUTBOX_MAX_RETRY: "7"
      RETRY_BASE_DELAY_SECONDS: "2"
      ADMIN_INTERNAL_KEY: ${ADMIN_INTERNAL_KEY:-dev-admin-internal-key}
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8082:8082"
    profiles: ["split"]

  category-service:
    build:
      context: ..
      dockerfile: services/category-service/Dockerfile
    environment:
      HTTP_PORT: "8083"
      LOG_FORMAT: dev
    ports:
      - "8083:8083"
    profiles: ["split"]

  budget-service:
    build:
      context: ..
      dockerfile: services/budget-service/Dockerfile
    environment:
      HTTP_PORT: "8084"
      DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/velune_budget?sslmode=disable
      JWT_SECRET: dev-only-change-me
      MIGRATIONS_PATH: file:///app/migrations
      TRANSACTION_SERVICE_URL: http://transaction-service:8082
      LOG_FORMAT: dev
      BROKER_URL: amqp://velune:velune@rabbitmq:5672/
      BROKER_EXCHANGE: velune.events
      BROKER_ROUTING_KEY: notification.overspend.requested
      BROKER_DLX: velune.events.dlx
      BROKER_DLQ: velune.events.dlq
      BROKER_DLQ_ROUTING_KEY: velune.dlq
      OUTBOX_BATCH_SIZE: "50"
      OUTBOX_MAX_RETRY: "7"
      RETRY_BASE_DELAY_SECONDS: "2"
    depends_on:
      transaction-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    ports:
      - "8084:8084"
    profiles: ["split"]

  report-service:
    build:
      context: ..
      dockerfile: services/report-service/Dockerfile
    environment:
      HTTP_PORT: "8085"
      TRANSACTION_SERVICE_URL: http://transaction-service:8082
      JWT_SECRET: dev-only-change-me
      LOG_FORMAT: dev
    depends_on:
      - transaction-service
    ports:
      - "8085:8085"
    profiles: ["split"]

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    environment:
      HTTP_PORT: "8086"
      DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/velune_notification?sslmode=disable
      MIGRATIONS_PATH: file:///app/migrations
      JWT_SECRET: dev-only-change-me
      BROKER_URL: amqp://velune:velune@rabbitmq:5672/
      BROKER_EXCHANGE: velune.events
      BROKER_QUEUE: notification.overspend
      BROKER_ROUTING_KEY: notification.overspend.requested
      BROKER_DLX: velune.events.dlx
      BROKER_DLQ: velune.events.dlq
      BROKER_DLQ_ROUTING_KEY: velune.dlq
      OUTBOX_BATCH_SIZE: "50"
      OUTBOX_MAX_RETRY: "7"
      RETRY_BASE_DELAY_SECONDS: "2"
      EMAIL_FROM: noreply@velune.local
      LOG_FORMAT: dev
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8086:8086"
    profiles: ["split"]

  admin-service:
    build:
      context: ..
      dockerfile: services/admin-service/Dockerfile
    environment:
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8099"
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-api-key}
      ADMIN_INTERNAL_KEY: ${ADMIN_INTERNAL_KEY:-dev-admin-internal-key}
      TRANSACTION_DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/velune_transaction?sslmode=disable
      BUDGET_DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/velune_budget?sslmode=disable
      NOTIFICATION_DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/velune_notification?sslmode=disable
      BROKER_URL: amqp://velune:velune@rabbitmq:5672/
      BROKER_EXCHANGE: velune.events
      BROKER_ROUTING_KEY: notification.overspend.requested
      BROKER_DLX: velune.events.dlx
      BROKER_DLQ: velune.events.dlq
      BROKER_DLQ_ROUTING_KEY: velune.dlq
      AUTH_SERVICE_URL: http://auth-service:8081
      TRANSACTION_SERVICE_URL: http://transaction-service:8082
      CATEGORY_SERVICE_URL: http://category-service:8083
      BUDGET_SERVICE_URL: http://budget-service:8084
      REPORT_SERVICE_URL: http://report-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      LOG_FORMAT: dev
    depends_on:
      rabbitmq:
        condition: service_healthy
      transaction-service:
        condition: service_started
      budget-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - "127.0.0.1:8099:8099"
    profiles: ["split"]

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    environment:
      HTTP_PORT: "8080"
      AUTH_SERVICE_URL: http://auth-service:8081
      TRANSACTION_SERVICE_URL: http://transaction-service:8082
      CATEGORY_SERVICE_URL: http://category-service:8083
      BUDGET_SERVICE_URL: http://budget-service:8084
      REPORT_SERVICE_URL: http://report-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      LEGACY_API_URL: http://legacy-api:8090
      LOG_FORMAT: dev
    ports:
      - "8080:8080"
    depends_on:
      - legacy-api
    profiles: ["split"]
