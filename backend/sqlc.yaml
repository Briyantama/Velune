version: "2"
sql:
  - engine: "postgresql"
    schema: "services/auth-service/internal/infrastructure/postgres/sqlc/schema.sql"
    queries: "services/auth-service/internal/infrastructure/postgres/sqlc/queries"
    gen:
      go:
        package: "db"
        out: "services/auth-service/internal/infrastructure/postgres/sqlc/generated"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_interface: false
