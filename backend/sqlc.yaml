version: "2"
sql:
  - engine: "postgresql"
    schema: "shared/sqlc/schemas/*.sql"
    queries: "shared/sqlc/queries/*.sql"
    gen:
      go:
        package: "db"
        out: "shared/sqlc/generated"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_interface: false
